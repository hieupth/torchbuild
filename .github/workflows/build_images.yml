name: Build Images

on:
  push:
    branches:
      - 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - 
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - 
        name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - 
        name: Checkout
        uses: actions/checkout@v2
      - 
        name: Torch v1.12.1 CUDA 11.2
        uses: docker/build-push-action@v3
        with:
          push: true
          context: .
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/torchbuild:1.12-cu112
          build-args: |
            CUDA=112
            TORCH=v1.12.1
      - 
        name: Torch v1.12.1 CUDA 11.3
        uses: docker/build-push-action@v3
        with:
          push: true
          context: .
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/torchbuild:1.12-cu113
          build-args: |
            CUDA=113
            TORCH=v1.12.1
      - 
        name: Torch v1.12.1 CUDA 11.4
        uses: docker/build-push-action@v3
        with:
          push: true
          context: .
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/torchbuild:1.12cu114
          build-args: |
            CUDA=114
            TORCH=v1.12.1
      - 
        name: Torch v1.12.1 CUDA 11.6
        uses: docker/build-push-action@v3
        with:
          push: true
          context: .
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/torchbuild:1.12-cu116
          build-args: |
            CUDA=116
            TORCH=v1.12.1
      - 
        name: Update docker description
        uses: peter-evans/dockerhub-description@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: hieupth/minicuda